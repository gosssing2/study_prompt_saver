<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>프롬프트 모음</title>
<script>
  // 첫 페인트 전에 테마를 적용해 깜빡임 방지
  (function () {
    var saved = localStorage.getItem("theme");
    var prefersDark =
      window.matchMedia &&
      window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute(
      "data-theme",
      saved || (prefersDark ? "dark" : "light")
    );
  })();
</script>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
/>
<style>
  :root {
    --brand-green: #00d4a4;
    --brand-green-deep: #00b894;
    --soft-mint: #e6fbf5;
    --primary: #0a0a0a;
    --on-primary: #ffffff;
    --canvas: #ffffff;
    --surface: #f5f6f7;
    --hairline: #e5e7eb;
    --hairline-soft: #f0f0f1;
    --ink: #0a0a0a;
    --charcoal: #1f2328;
    --steel: #6b7280;
    --stone: #9ca3af;

    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-full: 9999px;

    --font-sans: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI",
      sans-serif;
    --font-mono: "Geist Mono", "SF Mono", Menlo, Consolas, monospace;
  }

  /* 다크 모드 팔레트 (design.md 미수록 — Mintlify 톤에 맞춰 정의) */
  :root[data-theme="dark"] {
    --brand-green: #00d4a4;
    --brand-green-deep: #00b894;
    --soft-mint: #06281f;
    --primary: #f0f2f5; /* 다크에서는 밝은 pill 버튼 */
    --on-primary: #0a0a0a; /* 그 위 어두운 텍스트 */
    --canvas: #0e1116;
    --surface: #1a1f26;
    --hairline: #2a3038;
    --hairline-soft: #21262d;
    --ink: #f0f2f5;
    --charcoal: #cdd2d9;
    --steel: #9aa1ab;
    --stone: #6b727c;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    padding: 0;
  }

  body {
    font-family: var(--font-sans);
    font-weight: 500;
    color: var(--charcoal);
    background: var(--canvas);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background-color 200ms ease, color 200ms ease;
  }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 64px 32px 96px;
  }

  header.page-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 32px;
  }

  /* 테마 토글 버튼 (button-icon-circular) */
  .theme-toggle {
    flex: none;
    width: 40px;
    height: 40px;
    border-radius: var(--radius-full);
    border: 1px solid var(--hairline);
    background: var(--canvas);
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 150ms ease, background-color 200ms ease;
  }

  .theme-toggle svg {
    width: 18px;
    height: 18px;
  }

  .theme-toggle .sun {
    display: none;
  }
  .theme-toggle .moon {
    display: block;
  }
  :root[data-theme="dark"] .theme-toggle .sun {
    display: block;
  }
  :root[data-theme="dark"] .theme-toggle .moon {
    display: none;
  }

  h1 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.2;
    color: var(--ink);
    margin: 0 0 8px;
  }

  .subtitle {
    font-size: 16px;
    font-weight: 500;
    color: var(--steel);
    margin: 0;
  }

  /* 검색창 */
  .search-wrap {
    position: relative;
    margin: 24px 0 20px;
    max-width: 480px;
  }

  .search-input {
    width: 100%;
    height: 44px;
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-md);
    padding: 0 16px 0 40px;
    outline: none;
    transition: border-color 150ms ease;
  }

  .search-input::placeholder {
    color: var(--stone);
    font-weight: 500;
  }

  .search-input:focus {
    border: 2px solid var(--brand-green);
    padding-left: 39px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--steel);
    pointer-events: none;
  }

  .result-count {
    font-size: 13px;
    font-weight: 500;
    color: var(--steel);
    margin-bottom: 12px;
  }

  /* 표 */
  .table-wrap {
    border: 1px solid var(--hairline);
    border-radius: var(--radius-md);
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--canvas);
  }

  thead th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--steel);
    background: var(--surface);
    padding: 14px 20px;
    border-bottom: 1px solid var(--hairline);
    white-space: nowrap;
  }

  tbody td {
    padding: 16px 20px;
    border-bottom: 1px solid var(--hairline-soft);
    vertical-align: top;
    font-size: 14px;
  }

  tbody tr:last-child td {
    border-bottom: none;
  }

  .col-name {
    font-weight: 600;
    color: var(--ink);
    width: 28%;
    min-width: 160px;
  }

  .col-prompt {
    width: 56%;
  }

  .prompt-text {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 400;
    color: var(--charcoal);
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.5;
    margin: 0;
    cursor: pointer;
    transition: border-color 150ms ease;
    /* 3줄 초과 시 생략(…) 표시 */
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 3;
    line-clamp: 3;
    overflow: hidden;
  }

  .prompt-text:hover {
    border-color: var(--brand-green);
  }

  /* 모달 */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 10, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 1000;
  }

  .modal-overlay[hidden] {
    display: none; /* display:flex 가 hidden 속성을 덮지 않도록 */
  }

  .modal {
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-lg);
    padding: 24px;
    width: 100%;
    max-width: 720px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: rgba(0, 0, 0, 0.12) 0px 24px 48px -8px;
  }

  .modal-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
  }

  .modal-title {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--ink);
    margin: 0;
    word-break: break-word;
  }

  .modal-close {
    flex: none;
    width: 32px;
    height: 32px;
    border-radius: var(--radius-full);
    border: 1px solid var(--hairline);
    background: var(--canvas);
    color: var(--ink);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
  }

  .modal-body {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 400;
    color: var(--charcoal);
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-md);
    padding: 16px;
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.5;
    margin: 0;
    overflow: auto;
    flex: 1;
  }

  .modal-actions {
    margin-top: 16px;
    display: flex;
    justify-content: flex-end;
  }

  .col-copy {
    width: 16%;
    min-width: 96px;
    text-align: right;
    white-space: nowrap;
  }

  /* 복사 버튼 (검정 pill) */
  .copy-btn {
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 600;
    color: var(--on-primary);
    background: var(--primary);
    border: none;
    border-radius: var(--radius-full);
    padding: 10px 20px;
    cursor: pointer;
    transition: background-color 150ms ease;
  }

  .copy-btn:active {
    background: var(--charcoal);
  }

  .copy-btn.copied {
    background: var(--brand-green);
    color: #0a0a0a; /* 민트 배경 위 고정 어두운 텍스트 (양 테마 동일) */
  }

  /* 페이지네이션 */
  .pagination {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: center;
    margin-top: 24px;
  }

  .page-btn {
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 600;
    color: var(--steel);
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-full);
    padding: 8px 14px;
    min-width: 40px;
    cursor: pointer;
    transition: background-color 150ms ease, color 150ms ease,
      border-color 150ms ease;
  }

  .page-btn.active {
    background: var(--primary);
    color: var(--on-primary);
    border-color: var(--primary);
  }

  .page-btn:disabled {
    color: var(--stone);
    background: var(--surface);
    cursor: default;
  }

  .page-ellipsis {
    color: var(--steel);
    font-weight: 600;
    padding: 0 2px;
  }

  /* 상태 메시지 */
  .state-msg {
    padding: 48px 24px;
    text-align: center;
    font-size: 15px;
    font-weight: 500;
    color: var(--steel);
  }

  .state-msg.error {
    color: var(--charcoal);
  }

  .state-msg.error .hint {
    display: block;
    margin-top: 8px;
    font-size: 13px;
    color: var(--steel);
  }

  /* 반응형: 좁은 화면에서는 카드형으로 전환 */
  @media (max-width: 720px) {
    .container {
      padding: 40px 20px 64px;
    }
    h1 {
      font-size: 28px;
    }
    thead {
      display: none;
    }
    table,
    tbody,
    tr,
    td {
      display: block;
      width: 100% !important;
    }
    tbody tr {
      border-bottom: 1px solid var(--hairline);
      padding: 8px 0;
    }
    tbody tr:last-child {
      border-bottom: none;
    }
    tbody td {
      border-bottom: none;
      padding: 8px 16px;
    }
    .col-copy {
      text-align: left;
    }
    .copy-btn {
      width: 100%;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <header class="page-head">
      <div>
        <h1>프롬프트 모음</h1>
        <p class="subtitle">검색해서 찾고, 복사 버튼으로 바로 사용하세요.</p>
      </div>
      <button id="theme-toggle" class="theme-toggle" aria-label="라이트/다크 모드 전환" title="라이트/다크 모드 전환">
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
    </header>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input
        id="search"
        class="search-input"
        type="text"
        placeholder="프롬프트 이름이나 내용으로 검색"
        autocomplete="off"
        disabled
      />
    </div>

    <div id="count" class="result-count" hidden></div>

    <div id="content">
      <div class="state-msg" id="loading">불러오는 중…</div>
    </div>

    <div id="pagination" class="pagination" hidden></div>
  </div>

  <div id="modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head">
        <h2 id="modal-title" class="modal-title"></h2>
        <button id="modal-close" class="modal-close" aria-label="닫기">&times;</button>
      </div>
      <pre id="modal-body" class="modal-body"></pre>
      <div class="modal-actions">
        <button id="modal-copy" class="copy-btn">복사</button>
      </div>
    </div>
  </div>

  <script>
    // 데이터를 읽어올 구글 시트 ID. 시트를 교체하려면 이 한 줄만 바꾸면 됩니다.
    const SHEET_ID = "13MDrpeSlfAryNCFf1T3tATxC7UnA9EZqK10qUj_zerg";
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

    const PAGE_SIZE = 20; // 페이지당 표시 개수

    let prompts = []; // 전체 데이터 { name, text }
    let filtered = []; // 검색 필터 적용된 목록
    let currentPage = 1;

    const $search = document.getElementById("search");
    const $content = document.getElementById("content");
    const $count = document.getElementById("count");
    const $pagination = document.getElementById("pagination");

    // RFC4180 방식 CSV 파서: 따옴표, 내부 콤마, 줄바꿈 처리
    function parseCSV(text) {
      const rows = [];
      let row = [];
      let field = "";
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"') {
            if (text[i + 1] === '"') {
              field += '"';
              i++;
            } else {
              inQuotes = false;
            }
          } else {
            field += c;
          }
        } else {
          if (c === '"') {
            inQuotes = true;
          } else if (c === ",") {
            row.push(field);
            field = "";
          } else if (c === "\n") {
            row.push(field);
            rows.push(row);
            row = [];
            field = "";
          } else if (c === "\r") {
            // 무시 (\r\n 처리)
          } else {
            field += c;
          }
        }
      }
      // 마지막 필드/행 처리
      if (field.length > 0 || row.length > 0) {
        row.push(field);
        rows.push(row);
      }
      return rows;
    }

    function escapeHtml(s) {
      return s
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function render() {
      if (prompts.length === 0) {
        $content.innerHTML =
          '<div class="state-msg">표시할 프롬프트가 없습니다.</div>';
        $count.hidden = true;
        $pagination.hidden = true;
        return;
      }
      if (filtered.length === 0) {
        $content.innerHTML =
          '<div class="state-msg">검색 결과가 없습니다.</div>';
        $count.hidden = false;
        $count.textContent = "0개 결과";
        $pagination.hidden = true;
        return;
      }

      const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;

      const start = (currentPage - 1) * PAGE_SIZE;
      const pageItems = filtered.slice(start, start + PAGE_SIZE);

      $count.hidden = false;
      $count.textContent = `총 ${filtered.length}개 · ${currentPage} / ${totalPages} 페이지`;

      const rowsHtml = pageItems
        .map((p, idx) => {
          return `
            <tr>
              <td class="col-name">${escapeHtml(p.name)}</td>
              <td class="col-prompt"><pre class="prompt-text" data-idx="${idx}" title="클릭하면 전체 보기">${escapeHtml(
                p.text
              )}</pre></td>
              <td class="col-copy">
                <button class="copy-btn" data-idx="${idx}">복사</button>
              </td>
            </tr>`;
        })
        .join("");

      $content.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>프롬프트 이름</th>
                <th>프롬프트</th>
                <th></th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>`;

      // 복사 버튼 바인딩 (현재 페이지 항목 기준)
      $content.querySelectorAll(".copy-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          const p = pageItems[Number(btn.dataset.idx)];
          copyText(p.text, btn);
        });
      });

      // 프롬프트 클릭 시 모달로 전문 보기
      $content.querySelectorAll(".prompt-text").forEach((el) => {
        el.addEventListener("click", () => {
          openModal(pageItems[Number(el.dataset.idx)]);
        });
      });

      renderPagination(totalPages);
    }

    // 표시할 페이지 번호 목록 계산 (양 끝 + 현재 주변, 생략은 '...')
    function pageNumbers(current, total) {
      if (total <= 7) {
        return Array.from({ length: total }, (_, i) => i + 1);
      }
      const pages = [1];
      if (current > 3) pages.push("...");
      const s = Math.max(2, current - 1);
      const e = Math.min(total - 1, current + 1);
      for (let i = s; i <= e; i++) pages.push(i);
      if (current < total - 2) pages.push("...");
      pages.push(total);
      return pages;
    }

    function goToPage(p) {
      currentPage = p;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderPagination(totalPages) {
      if (totalPages <= 1) {
        $pagination.hidden = true;
        $pagination.innerHTML = "";
        return;
      }
      $pagination.hidden = false;
      $pagination.innerHTML = "";

      const makeBtn = (label, page, opts = {}) => {
        const btn = document.createElement("button");
        btn.className = "page-btn" + (opts.active ? " active" : "");
        btn.textContent = label;
        if (opts.disabled) {
          btn.disabled = true;
        } else {
          btn.addEventListener("click", () => goToPage(page));
        }
        return btn;
      };

      $pagination.appendChild(
        makeBtn("이전", currentPage - 1, { disabled: currentPage === 1 })
      );

      pageNumbers(currentPage, totalPages).forEach((p) => {
        if (p === "...") {
          const span = document.createElement("span");
          span.className = "page-ellipsis";
          span.textContent = "…";
          $pagination.appendChild(span);
        } else {
          $pagination.appendChild(
            makeBtn(String(p), p, { active: p === currentPage })
          );
        }
      });

      $pagination.appendChild(
        makeBtn("다음", currentPage + 1, {
          disabled: currentPage === totalPages,
        })
      );
    }

    async function copyText(text, btn) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (e) {
        // 클립보드 API 실패 시 폴백
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
        } catch (_) {}
        document.body.removeChild(ta);
      }
      const original = btn.textContent;
      btn.textContent = "복사됨";
      btn.classList.add("copied");
      setTimeout(() => {
        btn.textContent = original;
        btn.classList.remove("copied");
      }, 1500);
    }

    function applyFilter() {
      const q = $search.value.trim().toLowerCase();
      if (!q) {
        filtered = prompts;
      } else {
        filtered = prompts.filter(
          (p) =>
            p.name.toLowerCase().includes(q) ||
            p.text.toLowerCase().includes(q)
        );
      }
      currentPage = 1; // 검색하면 첫 페이지로
      render();
    }

    async function load() {
      try {
        const res = await fetch(CSV_URL);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const csv = await res.text();
        const rows = parseCSV(csv);
        if (rows.length === 0) {
          prompts = [];
        } else {
          // 첫 행은 헤더로 간주, 나머지를 데이터로
          prompts = rows
            .slice(1)
            .map((r) => ({
              name: (r[0] || "").trim(),
              text: (r[1] || "").trim(),
            }))
            .filter((p) => p.name !== "" || p.text !== "");
        }
        filtered = prompts;
        currentPage = 1;
        $search.disabled = false;
        render();
      } catch (e) {
        $content.innerHTML = `
          <div class="state-msg error">
            데이터를 불러오지 못했습니다.
            <span class="hint">구글 시트가 '링크가 있는 모든 사용자' 보기 가능으로 공유되어 있는지 확인해 주세요. (${escapeHtml(
              String(e.message || e)
            )})</span>
          </div>`;
      }
    }

    // 모달 제어
    const $modal = document.getElementById("modal");
    const $modalTitle = document.getElementById("modal-title");
    const $modalBody = document.getElementById("modal-body");
    const $modalCopy = document.getElementById("modal-copy");
    const $modalClose = document.getElementById("modal-close");
    let modalText = "";

    function openModal(item) {
      $modalTitle.textContent = item.name;
      $modalBody.textContent = item.text;
      modalText = item.text;
      $modalCopy.textContent = "복사";
      $modalCopy.classList.remove("copied");
      $modal.hidden = false;
      document.body.style.overflow = "hidden"; // 배경 스크롤 잠금
    }

    function closeModal() {
      $modal.hidden = true;
      document.body.style.overflow = "";
    }

    $modalClose.addEventListener("click", closeModal);
    $modal.addEventListener("click", (e) => {
      if (e.target === $modal) closeModal(); // 바깥 영역 클릭 시 닫기
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !$modal.hidden) closeModal();
    });
    $modalCopy.addEventListener("click", () => copyText(modalText, $modalCopy));

    // 테마 토글 (초기값은 head 스크립트에서 이미 적용됨)
    document.getElementById("theme-toggle").addEventListener("click", () => {
      const next =
        document.documentElement.getAttribute("data-theme") === "dark"
          ? "light"
          : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
    });

    $search.addEventListener("input", applyFilter);
    load();
  </script>
</body>
</html>
