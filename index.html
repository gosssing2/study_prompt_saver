<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>프롬프트 모음</title>
<script>
  // 첫 페인트 전에 테마를 적용해 깜빡임 방지
  (function () {
    var saved = localStorage.getItem("theme");
    var prefersDark =
      window.matchMedia &&
      window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute(
      "data-theme",
      saved || (prefersDark ? "dark" : "light")
    );
  })();
</script>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
/>
</head>
<body>
  <div class="container">
    <header class="page-head">
      <div>
        <h1>프롬프트 모음</h1>
        <p class="subtitle">검색해서 찾고, 복사 버튼으로 바로 사용하세요.</p>
      </div>
      <button id="theme-toggle" class="theme-toggle" aria-label="라이트/다크 모드 전환" title="라이트/다크 모드 전환">
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
    </header>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input
        id="search"
        class="search-input"
        type="text"
        placeholder="프롬프트 이름이나 내용으로 검색"
        autocomplete="off"
        disabled
      />
    </div>

    <div id="count" class="result-count" hidden></div>

    <div id="content">
      <div class="state-msg" id="loading">불러오는 중…</div>
    </div>

    <div id="pagination" class="pagination" hidden></div>
  </div>

  <div id="modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head">
        <h2 id="modal-title" class="modal-title"></h2>
        <button id="modal-close" class="modal-close" aria-label="닫기">&times;</button>
      </div>
      <pre id="modal-body" class="modal-body"></pre>
      <div class="modal-actions">
        <button id="modal-copy" class="copy-btn">복사</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
